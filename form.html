<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      input {
        margin: 0px;
        display: block;
        padding: 3px;
      }
      #container {
        padding: 50px;
        border: 1px solid blue;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h3>Sign IN</h3>
      <form action="form.html" id="form" method="get">
        <label for="name">First Name:</label>
        <input type="text" placeholder="Name" id="name" />
        <p id="resultName"></p>
        <label for="email">Email:</label>
        <input type="email" placeholder="Email" id="email" />
        <p id="resultEmail"></p>
        <label for="pass">Password:</label>
        <input type="password" placeholder="Password" id="pass" />
        <p id="resultPass"></p>
        <button type="submit" id="btn">Submit</button>
      </form>
    </div>
    <script>
      let btn = document.getElementById("btn");
      let name = document.getElementById("name");
      let email = document.getElementById("email");
      let pass = document.getElementById("pass");

      btn.addEventListener("click", validation);
      function validation(e) {
        e.preventDefault();

        if (name.value.length == 0) {
          name.setAttribute("placeholder", "Please provide name");
          name.style.backgroundColor = "red";
        }

        if (email.value.length == 0) {
          email.setAttribute("placeholder", "Please provide email");
          email.style.backgroundColor = "red";
        }

        if (pass.value.length == 0) {
          pass.setAttribute("placeholder", "Please provide password");
          pass.style.backgroundColor = "red";
        }

        if (pass.value.length > 0 && pass.value.length <= 7) {
          pass.setAttribute("placeholder", "Please provide strong password");
          pass.style.backgroundColor = "red";
        }

        if (email.value.length > 0 && name.value.length > 0) {
          name.style.backgroundColor = "white";
          email.style.backgroundColor = "white";
        }

        if (pass.value.length >= 8) {
          pass.style.backgroundColor = "white";
        }
      }
    </script>
  </body>
</html>
