<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    .cal-con {
      display: flex;
      flex-direction: column;
      justify-content: end;
      align-items: center;
      height: 100vh;
      background-color: #92b9c9;
    }
    .cont {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 3px;
    }

    .cont > div {
      border: 1px solid black;
      background-color: black;
      height: 30px;
      width: 30px;
      padding: 20px;
      font-size: 20px;
      border-radius: 50%;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .cont > .zero {
      width: 106px;
      height: 30px;
      border-radius: 50px;
    }
    input {
      /* width: 70px; */
      width: 285px;
      background-color: rgba(213, 213, 207, 0.573);
      border: none;
      padding: 10px;
      margin-bottom: 10px;
    }
  </style>
  <body>
    <div class="cal-con">
      <input type="text" id="display" />
      <div class="cont">
        <div class="btn special">AC</div>
        <div class="btn special">C</div>
        <div class="btn special">%</div>
        <div class="btn function">/</div>
      </div>

      <div class="cont">
        <div class="btn number">7</div>
        <div class="btn number">8</div>
        <div class="btn number">9</div>
        <div class="btn function">*</div>
      </div>

      <div class="cont">
        <div class="btn number">4</div>
        <div class="btn number">5</div>
        <div class="btn number">6</div>
        <div class="btn function">-</div>
      </div>

      <div class="cont">
        <div class="btn number">1</div>
        <div class="btn number">2</div>
        <div class="btn number">3</div>
        <div class="btn function">+</div>
      </div>

      <div class="cont">
        <div class="zero btn number">0</div>
        <div class="btn special">.</div>
        <div class="btn special">=</div>
      </div>
    </div>
    <script>
      let buttons = document.querySelectorAll(".btn");
      let display = document.getElementById("display");

      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          let value = button.textContent;
          let current = display.value;
          let lastChar = current[current.length - 1];

          if (button.classList.contains("number")) {
            display.value += value;
          } else if (value === "AC") {
            current = "";
          } else if (value === "=") {
            try {
              current = eval(current);
            } catch (error) {
              current = "error";
            }
          } else {
            if ((current = "")) return;
            if (["%", "*", "/", "-", "+"].includes(lastChar)) {
              current = current.slice(0, -1) + value;
            } else {
              current += value;
            }
          }
        });
      });
    </script>
  </body>
</html>
